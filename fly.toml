# Fly.io configuration for Ziad Yakoot portfolio website
app = "ziad-yakoot"
primary_region = "iad"

[build]
  image = "ziad-yakoot:latest"

[env]
  FLASK_ENV = "production"
  PYTHONUNBUFFERED = "true"

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[checks]
  [checks.alive]
    grace_period = "5s"
    interval = "30s"
    method = "get"
    path = "/"
    protocol = "http"
    timeout = "5s"
    type = "http"

# Database volumes (SQLite storage)
[[mounts]]
  source = "data"
  destination = "/app/data"
  initial_size = "1gb"
